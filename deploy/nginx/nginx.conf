# ============================================================================
# Lan IM Nginx 核心网关配置
# ============================================================================
user nginx;
# 物理核心：开启与 CPU 核心数一致的 worker 进程
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # C100K：单进程允许的最大连接数，必须配合宿主机 ulimit -n 65535 使用
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 零拷贝物理防线：针对静态文件极速下发
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # 核心防线 1：突破默认 1MB 载荷限制，保障 /upload/chunk 接口正常接收大文件分片
    client_max_body_size 500M;

    # 后端负载均衡池 (请将 im-backend 替换为你的 Go 容器名或真实 IP)
    upstream backend_api {
        server im-backend:8080 max_fails=3 fail_timeout=10s;
        # 维持与后端的长连接池，降低握手开销
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # ====================================================================
        # 1. 静态资源防线 (前端页面挂载)
        # ====================================================================
        location / {
            # 你的 index.html 及前端工程构建产物必须挂载到此目录
            root /usr/share/nginx/html;
            # 默认入口指向 index.html
            index index.html public.html;
            # 应对单页面应用 (SPA) 路由，找不到文件时回退到 index.html
            try_files $uri $uri/ /index.html;
        }

        # ====================================================================
        # 2. WebSocket 核心引擎防线 (极度危险区域)
        # ====================================================================
        location /api/v1/ws {
            proxy_pass http://backend_api;
            # 协议升级劫持：必须显式声明 HTTP/1.1 并传递 Upgrade 头
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            # 物理透传客户端真实 IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 长连接存活防线：防止 Nginx 默认 60 秒无数据传输强行切断 WebSocket
            # 必须大于你 Go 代码里 Ping/Pong 心跳的周期
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ====================================================================
        # 3. 常规 HTTP API 路由防线
        # ====================================================================
        location /api/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            # 清除 Connection 头，确保复用 upstream 的 keepalive
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}