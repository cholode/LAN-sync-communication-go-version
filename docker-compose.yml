  #   image: nginx:alpine
  #   container_name: im-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     # 挂载核心配置文件（只读）
  #     - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     # 挂载HTTPS证书（只读）
  #     - ./deploy/certs:/etc/nginx/certs:ro
  #     # 挂载前端静态资源（动静分离）
  #     - ./frontend/dist:/usr/share/nginx/html:ro
  #     # 挂载文件上传目录（只读）
  #     - ./data/uploads:/var/www/uploads:ro
  #   networks:
