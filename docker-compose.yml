

networks:
  lan-im-network:
    driver: bridge

volumes:
  mysql_data:

services:
  db:
    image: mysql:8.0
    container_name: im-mysql
    restart: unless-stopped
    #network_mode: "host"
    networks:
      - lan-im-network
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # 强制使用 127.0.0.1 走 TCP 协议探活，规避 Unix Socket 陷阱
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: im-backend
    restart: unless-stopped
    #network_mode: "host"
    networks:
      - lan-im-network
    ports:
     - "8080:8080"
    environment:
      # 修复语法错误：彻底删除无效的 db: 前缀
      - DB_DSN=root:${DB_PASSWORD}@tcp(db:3306)/${DB_NAME}?charset=utf8mb4&parseTime=True&loc=Local
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 1G
    volumes:
      - ./data_storage:/app/data
    depends_on:
      db:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    #image: nginx:alpine
    container_name: im-nginx
    restart: unless-stopped
    #network_mode: "host"
    networks:
      - lan-im-network
    ports:
      - "80:80"
      - "443:443"

    volumes:
      # - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./deploy/certs:/etc/nginx/certs:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./data/uploads:/var/www/uploads:ro
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - backend