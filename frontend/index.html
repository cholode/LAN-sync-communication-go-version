<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LAN-IM 界面</title>
  <style>
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:#121212;color:#fff;margin:0;display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:300px;background:#1a1a1a;border-right:1px solid #333;display:flex;flex-direction:column;}
    .sidebar-header{padding:20px;background:#222;border-bottom:1px solid #333;}
    .room-list{flex:1;overflow-y:auto;padding:10px;}
    .room-item{padding:15px;margin-bottom:8px;background:#2d2d2d;border-radius:6px;cursor:pointer;transition:0.2s;border-left:4px solid transparent;}
    .room-item:hover{background:#3d3d3d;}
    .room-item.active{border-left-color:#007acc;background:#2a2a2a;}
    .room-name{font-weight:bold;font-size:15px;}
    .room-id{font-size:12px;color:#888;margin-top:5px;}
    .main-view{flex:1;display:flex;flex-direction:column;background:#1e1e1e;}
    .chat-header{height:60px;background:#222;border-bottom:1px solid #333;display:flex;align-items:center;padding:0 20px;font-weight:bold;justify-content:space-between;}
    #chat-box{flex:1;overflow-y:auto;padding:20px;font-family:Consolas,monospace;}
    .input-area{padding:20px;background:#222;border-top:1px solid #333;display:flex;gap:10px;}
    input[type="text"]{flex:1;padding:12px;background:#333;border:1px solid #444;color:white;border-radius:6px;outline:none;}
    button{padding:12px 20px;background:#007acc;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:0.2s;}
    button:hover{background:#005999;}
    button.danger{background:#c0392b;}
    .log-sys{color:#f39c12;margin-bottom:8px;}
    .log-msg{color:#2ecc71;margin-bottom:8px;}
    .log-err{color:#e74c3c;margin-bottom:8px;}
    .log-hist{color:#bdc3c7;margin-bottom:8px;}
    .control-panel{width:350px;background:#1a1a1a;border-left:1px solid #333;padding:20px;overflow-y:auto;}
    .panel-section{background:#2d2d2d;padding:15px;border-radius:8px;margin-bottom:20px;}
    .panel-section h3{margin-top:0;font-size:14px;color:#aaa;border-bottom:1px solid #444;padding-bottom:10px;}
    .flex-row{display:flex;gap:10px;margin-bottom:10px;}
    #progress-bar{height:8px;background:#8e44ad;width:0%;border-radius:4px;transition:width 0.2s;}
    .progress-bg{background:#444;border-radius:4px;margin-top:10px;overflow:hidden;height:8px;}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h3 style="margin:0;color:#007acc;">我的群聊列表</h3>
      <button onclick="logout()" style="width:100%;margin-top:10px;background:#444;">退出登录</button>
    </div>
    <div class="room-list" id="room-list">
      <div style="color:#666;text-align:center;margin-top:20px;">正在加载群聊列表...</div>
    </div>
  </div>

  <div class="main-view">
    <div class="chat-header">
      <span id="current-room-title">未选择群聊，请选择或创建群聊</span>
      <button onclick="fetchHistory()" style="background:transparent;border:1px solid #555;padding:6px 12px;">获取历史消息</button>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
      <input type="text" id="msg-content" placeholder="输入消息 (按 Enter 发送)" onkeypress="handleEnter(event)">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>

  <div class="control-panel">
    <div class="panel-section">
      <h3>创建与加入群聊</h3>
      <div class="flex-row">
        <input type="text" id="new-room-name" placeholder="群聊名称" style="width:60%;">
        <button onclick="createRoom()" style="background:#27ae60;width:40%;">创建群聊</button>
      </div>
      <div class="flex-row">
        <input type="number" id="join-room-id" placeholder="群聊 ID" style="width:60%;">
        <button onclick="joinRoom()" style="background:#f39c12;width:40%;">加入群聊</button>
      </div>
    </div>

    <div class="panel-section">
      <h3>群成员管理</h3>
      <button onclick="getRoomMembers()" style="width:100%;margin-bottom:10px;background:#2980b9;">获取群成员列表</button>
      <div class="flex-row">
        <input type="number" id="kick-user-id" placeholder="用户ID (退群填自己)" style="width:60%;">
        <button class="danger" onclick="removeMember()" style="width:40%;">移除成员</button>
      </div>
    </div>

    <div class="panel-section">
      <h3>文件传输</h3>
      <input type="file" id="file-input" style="width:100%;margin-bottom:10px;">
      <div class="flex-row">
        <button id="btn-upload" onclick="startUpload()" style="background:#8e44ad;width:60%;">开始上传</button>
        <button id="btn-cancel" onclick="cancelUpload()" class="danger" style="width:40%;" disabled>取消上传</button>
      </div>
      <div style="font-size:12px;color:#888;margin-top:10px;" id="upload-status">等待选择文件...</div>
      <div class="progress-bg"><div id="progress-bar"></div></div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8080/api/v1";
    const WS_BASE = "ws://127.0.0.1:8080/api/v1/ws";
    const jwtToken = localStorage.getItem("lan_im_token");

    if (!jwtToken) {
      alert("请先登录！");
      window.location.href = "login.html";
    }

    let ws = null;
    let currentRoomId = null;
    let isUploading = false;
    let uploadAbortController = null;

    function log(msg, type) {
      const box = document.getElementById("chat-box");
      box.innerHTML += `<div class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      box.scrollTop = box.scrollHeight;
    }

    function logout() {
      localStorage.removeItem("lan_im_token");
      window.location.href = "login.html";
    }

    async function init() {
      await loadMyRooms();
      connectWS();
    }

    async function loadMyRooms() {
      try {
        const res = await fetch(`${API_BASE}/my_rooms`, {
          headers: { 'Authorization': `Bearer ${jwtToken}` }
        });
        const data = await res.json();
        const listObj = document.getElementById("room-list");
        if (!res.ok) return listObj.innerHTML = `<div style="color:red;text-align:center;">加载群聊失败</div>`;
        listObj.innerHTML = "";
        if (!data.rooms || data.rooms.length === 0) {
          listObj.innerHTML = `<div style="color:#888;text-align:center;margin-top:20px;">暂无加入的群聊</div>`;
          return;
        }
        data.rooms.forEach(room => {
          const div = document.createElement("div");
          div.className = "room-item";
          div.onclick = () => selectRoom(room.room_id, room.room_name, div);
          div.innerHTML = `<div class="room-name"># ${room.room_name}</div><div class="room-id">ID: ${room.room_id}</div>`;
          listObj.appendChild(div);
        });
      } catch (e) {
        log("加载群列表网络异常", "log-err");
      }
    }

    function selectRoom(id, name, element) {
      currentRoomId = id;
      document.getElementById("current-room-title").innerText = `当前群聊：${name} (ID: ${id})`;
      document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
      if(element) element.classList.add('active');
      document.getElementById("chat-box").innerHTML = "";
      log(`已切换至群聊 [${id}]，可获取历史消息。`, "log-sys");
    }

    function connectWS() {
      ws = new WebSocket(`${WS_BASE}?token=${jwtToken}`);
      ws.onopen = () => log("WebSocket 连接成功", "log-sys");
      ws.onclose = () => log("WebSocket 连接断开", "log-err");
      ws.onerror = () => log("WebSocket 连接异常", "log-err");
      ws.onmessage = (e) => {
        const msgs = e.data.split('\n');
        msgs.forEach(rawText => {
          if (!rawText.trim()) return;
          try {
            const msg = JSON.parse(rawText);
            const room = msg.room_id || msg.RoomID;
            const content = msg.content || msg.Content;
            const sender = msg.sender_id || msg.SenderID;
            if (room === currentRoomId || room === "全局") {
              log(`UID(${sender}): ${content}`, "log-msg");
            }
          } catch (err) {
            log("消息格式错误", "log-err");
          }
        });
      };
    }

    function handleEnter(e) {
      if (e.key === 'Enter') sendMsg();
    }

    function sendMsg() {
      if (!currentRoomId) return alert("请先选择一个群聊！");
      if (!ws || ws.readyState !== WebSocket.OPEN) return alert("连接未就绪！");
      const input = document.getElementById("msg-content");
      if (!input.value) return;
      ws.send(JSON.stringify({ room_id: currentRoomId, content: input.value }));
      log(`发送: ${input.value}`, "log-sys");
      input.value = "";
    }

    async function fetchHistory() {
      if (!currentRoomId) return alert("请先选择群聊！");
      try {
        const res = await fetch(`${API_BASE}/rooms/${currentRoomId}/messages`, {
          headers: { 'Authorization': `Bearer ${jwtToken}` }
        });
        const data = await res.json();
        const msgs = data.data || data.messages || data || [];
        if (!msgs.length) return log(`暂无历史消息。`, "log-hist");
        msgs.forEach(msg => log(`[历史] UID(${msg.sender_id || msg.SenderID}): ${msg.content || msg.Content}`, "log-hist"));
      } catch (e) {
        log("获取历史消息异常", "log-err");
      }
    }

    async function createRoom() {
      const name = document.getElementById("new-room-name").value;
      if (!name) return alert("群聊名称不可为空");
      try {
        const res = await fetch(`${API_BASE}/rooms`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${jwtToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name: name })
        });
        if (res.ok) {
          alert("创建群聊成功！");
          loadMyRooms();
        } else alert("创建群聊失败");
      } catch (e) {
        alert("网络异常");
      }
    }

    async function joinRoom() {
      const id = parseInt(document.getElementById("join-room-id").value);
      if (!id) return;
      try {
        const res = await fetch(`${API_BASE}/rooms/${id}/join`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${jwtToken}` }
        });
        if (res.ok) {
          alert("加入群聊成功！");
          loadMyRooms();
        } else alert("加入群聊失败");
      } catch (e) {
        alert("网络异常");
      }
    }

    async function getRoomMembers() {
      if (!currentRoomId) return alert("请先选择群聊！");
      try {
        const res = await fetch(`${API_BASE}/rooms/${currentRoomId}/members`, {
          headers: { 'Authorization': `Bearer ${jwtToken}` }
        });
        const data = await res.json();
        if (res.ok) {
          log(`[群成员列表]：`, "log-sys");
          data.members.forEach(m => log(` - UID: ${m.user_id} | Name: ${m.username}`, "log-sys"));
        } else log(`权限不足：${data.error}`, "log-err");
      } catch (e) {
        log("请求异常", "log-err");
      }
    }

    async function removeMember() {
      if (!currentRoomId) return alert("请先选择群聊！");
      const targetId = parseInt(document.getElementById("kick-user-id").value);
      if (!targetId) return;
      try {
        const res = await fetch(`${API_BASE}/rooms/${currentRoomId}/members/${targetId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${jwtToken}` }
        });
        if (res.ok) {
          log(`操作成功！`, "log-sys");
          loadMyRooms();
        } else log(`操作失败：${(await res.json()).error}`, "log-err");
      } catch (e) {
        log("请求异常", "log-err");
      }
    }

    async function startUpload() {
      if (!currentRoomId) return alert("请先选择群聊！");
      if (isUploading) return;
      const fileInput = document.getElementById('file-input');
      if (!fileInput.files.length) return alert("请选择文件！");
      const file = fileInput.files[0];
      const chunkSize = 1 * 1024 * 1024;
      const totalChunks = Math.ceil(file.size / chunkSize);
      const fileHash = "mock_hash_" + file.name + "_" + file.size;
      isUploading = true;
      document.getElementById('btn-upload').disabled = true;
      document.getElementById('btn-cancel').disabled = false;
      uploadAbortController = new AbortController();
      const statusBox = document.getElementById('upload-status');

      try {
        statusBox.innerText = `检查文件上传状态...`;
        const checkRes = await fetch(`${API_BASE}/upload/status?hash=${fileHash}&filename=${encodeURIComponent(file.name)}`, {
          headers: {'Authorization': `Bearer ${jwtToken}`}
        });
        const checkData = await checkRes.json();
        if (checkData.status === "completed") {
          document.getElementById('progress-bar').style.width = '100%';
          statusBox.innerText = `文件秒传成功！`;
          ws.send(JSON.stringify({ room_id: currentRoomId, content: `[文件] ${checkData.download_url}` }));
          unlockUploadUI();
          return;
        }
        const uploadedChunks = checkData.uploaded_chunks || [];
        statusBox.innerText = `检测到已上传分片，继续上传...`;

        for (let i = 0; i < totalChunks; i++) {
          if (uploadedChunks.includes(i)) {
            updateProgress(i + 1, totalChunks);
            continue;
          }
          const formData = new FormData();
          formData.append('chunk', file.slice(i * chunkSize, Math.min((i + 1) * chunkSize, file.size)));
          formData.append('hash', fileHash);
          formData.append('chunk_index', i);
          const res = await fetch(`${API_BASE}/upload/chunk`, {
            method: 'POST',
            headers: {'Authorization': `Bearer ${jwtToken}`},
            body: formData,
            signal: uploadAbortController.signal
          });
          if (!res.ok) throw new Error("分片上传失败");
          updateProgress(i + 1, totalChunks);
        }

        statusBox.innerText = `合并文件分片...`;
        const mergeData = new FormData();
        mergeData.append('hash', fileHash);
        mergeData.append('filename', file.name);
        mergeData.append('total_chunks', totalChunks);
        const mergeRes = await fetch(`${API_BASE}/upload/merge`, {
          method: 'POST',
          headers: {'Authorization': `Bearer ${jwtToken}`},
          body: mergeData
        });
        const mergeResult = await mergeRes.json();
        if (mergeRes.ok) {
          statusBox.innerText = `文件上传成功！`;
          ws.send(JSON.stringify({ room_id: currentRoomId, content: `[文件] ${mergeResult.download_url}` }));
        } else throw new Error(mergeResult.error);
      } catch (err) {
        statusBox.innerText = err.name === 'AbortError' ? `上传已取消！` : `上传失败: ${err.message}`;
      } finally {
        unlockUploadUI();
      }
    }

    async function cancelUpload() {
      if (!isUploading) return;
      if (uploadAbortController) uploadAbortController.abort();
      const file = document.getElementById('file-input').files[0];
      if(!file) return;
      document.getElementById('upload-status').innerText = `清理临时文件...`;
      try {
        await fetch(`${API_BASE}/upload/cancel?hash=mock_hash_${file.name}_${file.size}`, {
          method: 'DELETE',
          headers: {'Authorization': `Bearer ${jwtToken}`}
        });
        document.getElementById('upload-status').innerText = `上传已取消，临时文件已清理`;
        document.getElementById('progress-bar').style.width = '0%';
      } catch (e) {}
    }

    function updateProgress(c, t) {
      document.getElementById('progress-bar').style.width = Math.round((c / t) * 100) + '%';
      document.getElementById('upload-status').innerText = `上传进度: ${Math.round((c / t) * 100)}%`;
    }

    function unlockUploadUI() {
      isUploading = false;
      document.getElementById('btn-upload').disabled = false;
      document.getElementById('btn-cancel').disabled = true;
    }

    window.onload = init;
  </script>
</body>
</html>
