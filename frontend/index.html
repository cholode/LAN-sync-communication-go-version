<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LAN-IM 终端控制台 - 登录验证</title>
  <style>
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:#121212;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
    .login-box{background:#1e1e1e;padding:40px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,0.5);width:350px;border:1px solid #333;}
    .login-box h2{margin-top:0;color:#007acc;text-align:center;margin-bottom:30px;}
    input{width:100%;padding:12px;margin:10px 0;background:#2d2d2d;border:1px solid #444;color:#fff;border-radius:5px;box-sizing:border-box;outline:none;}
    input:focus{border-color:#007acc;}
    button{width:100%;padding:12px;margin-top:20px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;font-size:16px;transition:0.2s;}
    .btn-login{background:#007acc;color:white;}
    .btn-login:hover{background:#005999;}
    .btn-reg{background:transparent;color:#aaa;border:1px solid #555;margin-top:10px;}
    .btn-reg:hover{background:#333;color:white;}
    #msg{text-align:center;margin-top:15px;font-size:14px;color:#e74c3c;height:20px;}
  </style>
</head>
<body>
  <div class="login-box">
    <h2>LAN-IM 系统登录</h2>
    <input type="text" id="username" placeholder="用户名" autocomplete="off">
    <input type="password" id="password" placeholder="密码">
    <button class="btn-login" onclick="auth('login')">登录</button>
    <button class="btn-reg" onclick="auth('register')">注册</button>
    <div id="msg"></div>
  </div>

  <script>
    const API_BASE = "/api/v1";
    if (localStorage.getItem("lan_im_token")) {
      window.location.href = "public.html";
    }

    async function auth(action) {
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;
      const msgBox = document.getElementById("msg");
      if (!u || !p) return msgBox.innerText = "请输入用户名和密码";
      msgBox.style.color = "#aaa";
      msgBox.innerText = "正在处理...";

      try {
        const res = await fetch(`${API_BASE}/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (res.ok) {
          if (action === 'register') {
            msgBox.style.color = "#2ecc71";
            msgBox.innerText = "注册成功，请登录系统";
          } else {
            localStorage.setItem("lan_im_token", data.token);
            if (data.user) {
              localStorage.setItem("lan_im_user", JSON.stringify(data.user));
            }
            msgBox.style.color = "#2ecc71";
            msgBox.innerText = "登录成功，正在跳转...";
            setTimeout(() => window.location.href = "public.html", 500);
          }
        } else {
          msgBox.style.color = "#e74c3c";
          msgBox.innerText = data.error || "操作失败，请重试";
        }
      } catch (e) {
        msgBox.style.color = "#e74c3c";
        msgBox.innerText = "网络连接异常，请检查后重试";
      }
    }
  </script>
</body>
</html>
