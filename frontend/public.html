<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LAN-IM - 局域网即时通讯系统</title>
  <style>
    :root {
      /* 科技风格基础配色 */
      --bg: #020813;
      --panel: rgba(6, 18, 36, 0.85);
      --panel2: rgba(10, 30, 56, 0.6);
      --border: #00d2ff;
      --border-dim: #005c8a;
      --text: #e0f2fe;
      --muted: #00a8cc;
      --accent: #00f0ff;
      --accent-hover: #00ffff;
      --msg-own: rgba(0, 208, 255, 0.15);
      --msg-other: rgba(10, 30, 56, 0.8);
      --danger: #ff003c;
      --glow: 0 0 10px rgba(0, 210, 255, 0.4);
      --glow-strong: 0 0 15px rgba(0, 240, 255, 0.7);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Consolas', 'Courier New', 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      /* 添加网格线背景增强科技感 */
      background-image: 
        linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text);
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 52px;
      min-height: 52px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 10px rgba(0, 210, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
    }
    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--accent);
      box-shadow: var(--glow-strong);
    }
    .topbar-brand { font-weight: 700; font-size: 16px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; text-shadow: var(--glow); }
    .topbar-user {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
    }
    .topbar-user-meta { text-align: right; line-height: 1.35; }
    .topbar-user-name { font-weight: 600; color: var(--accent); }
    .topbar-user-id { color: var(--muted); font-size: 12px; }
    .btn-ghost {
      padding: 6px 14px;
      background: rgba(0, 210, 255, 0.05);
      border: 1px solid var(--border-dim);
      color: var(--accent);
      border-radius: 2px;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .btn-ghost:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--accent); box-shadow: var(--glow); }
    .app-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .sidebar {
      width: 280px;
      min-width: 240px;
      background: var(--panel);
      border-right: 1px solid var(--border-dim);
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }
    .sidebar-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-dim);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .room-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }
    /* 滚动条样式定制 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
    ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .room-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--panel2);
      border-radius: 2px;
      cursor: pointer;
      border: 1px solid var(--border-dim);
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .room-item:hover { background: rgba(0, 210, 255, 0.05); border-color: var(--accent); border-left-color: var(--accent); }
    .room-item.active {
      border-color: var(--accent);
      border-left: 3px solid var(--accent);
      background: rgba(0, 210, 255, 0.1);
      box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2);
    }
    .room-item.hidden { display: none; }
    .room-name { font-weight: 600; font-size: 14px; color: #fff; }
    .room-id { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: monospace; }
    .main-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: transparent;
    }
    .chat-header {
      height: 56px;
      min-height: 56px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      font-weight: 600;
      font-size: 15px;
      background: var(--panel);
      text-shadow: 0 0 5px rgba(255,255,255,0.3);
    }
    .chat-header-sub { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 2px; font-family: monospace; }
    .chat-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .chat-history-hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 8px;
      min-height: 28px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .msg-row { display: flex; flex-direction: column; max-width: 85%; }
    .msg-row.own { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; }
    .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; padding: 0 4px; font-family: monospace; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
      border: 1px solid transparent;
      font-family: 'Segoe UI', sans-serif;
    }
    .msg-row.own .msg-bubble { 
      background: var(--msg-own); 
      border-color: var(--accent);
      box-shadow: 0 0 5px rgba(0, 210, 255, 0.2);
    }
    .msg-row.other .msg-bubble { 
      background: var(--msg-other); 
      border-color: var(--border-dim);
    }
    .msg-row.sys .msg-bubble { background: rgba(243, 156, 18, 0.1); border-color: #f39c12; color: #f39c12; font-size: 12px; padding: 4px 10px; text-transform: uppercase; }
    .msg-row.err .msg-bubble { background: rgba(255, 0, 60, 0.1); border-color: var(--danger); color: var(--danger); font-size: 12px; }
    .msg-row.hist .msg-bubble { opacity: 0.7; }
    .msg-bubble .msg-link { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); word-break: break-all; }
    .msg-bubble .msg-link:hover { color: var(--accent-hover); text-shadow: var(--glow); }
    .input-area {
      padding: 14px 20px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
    }
    .input-area::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--accent);
      box-shadow: var(--glow-strong);
    }
    input[type="text"], input[type="number"], input[type="search"], input[type="file"] {
      flex: 1;
      padding: 11px 14px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-dim);
      color: var(--text);
      border-radius: 2px;
      outline: none;
      font-size: 14px;
      font-family: monospace;
      transition: all 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: var(--glow) inset; background: rgba(0, 210, 255, 0.05); }
    button.primary {
      padding: 11px 20px;
      background: rgba(0, 210, 255, 0.1);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 2px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    button.primary:hover:not(:disabled) { 
      background: var(--accent); 
      color: #000; 
      box-shadow: var(--glow-strong); 
    }
    button.primary:disabled { border-color: var(--border-dim); color: var(--border-dim); opacity: 0.5; cursor: not-allowed; }
    button.danger { border-color: var(--danger); color: var(--danger); background: rgba(255, 0, 60, 0.05); }
    button.danger:hover:not(:disabled) { background: var(--danger); color: #fff; box-shadow: 0 0 15px rgba(255, 0, 60, 0.5); }
    .aside {
      width: 320px;
      min-width: 280px;
      background: var(--panel);
      border-left: 1px solid var(--border-dim);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      box-shadow: -2px 0 10px rgba(0,0,0,0.5);
    }
    .aside-block {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border-dim);
    }
    .aside-block h3 {
      margin: 0 0 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
    }
    .aside-block h3::before {
      content: '>';
      margin-right: 6px;
      color: var(--danger);
      font-family: monospace;
    }
    .profile-card {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 2px;
      background: rgba(0, 210, 255, 0.1);
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: var(--accent);
      flex-shrink: 0;
      box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2);
    }
    .profile-lines { min-width: 0; }
    .profile-lines .name { font-weight: 600; font-size: 15px; color: #fff; }
    .profile-lines .sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: monospace; }
    .member-list {
      overflow-y: auto;
      font-size: 12px;
      font-family: monospace;
    }
    .aside-members-panel {
      margin-top: auto;
      border-top: 1px solid var(--border-dim);
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .aside-members-panel .member-list {
      flex: 1 1 auto;
      min-height: 140px;
      max-height: min(48vh, 420px);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      padding: 4px 0;
      background: rgba(0,0,0,0.3);
    }
    .members-room-hint {
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 10px;
      line-height: 1.35;
    }
    .member-item {
      padding: 8px 10px;
      border-radius: 0;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-left: 2px solid transparent;
    }
    .member-item:nth-child(odd) { background: rgba(0, 210, 255, 0.02); }
    .member-item:hover { background: rgba(0, 210, 255, 0.08); border-left-color: var(--accent); }
    .member-name { font-weight: 500; color: #fff; }
    .member-id { color: var(--muted); font-size: 11px; }
    .flex-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .flex-row:last-child { margin-bottom: 0; }
    .flex-row input { min-width: 0; }
    .flex-row button { flex-shrink: 0; white-space: nowrap; }
    #progress-bar { height: 4px; background: var(--accent); width: 0%; box-shadow: var(--glow-strong); transition: width 0.2s; }
    .progress-bg { background: rgba(0,0,0,0.5); border: 1px solid var(--border-dim); margin-top: 8px; overflow: hidden; height: 6px; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.4; font-family: monospace; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">LAN-IM 局域网即时通讯</div>
    <div class="topbar-user">
      <div class="topbar-user-meta">
        <div class="topbar-user-name" id="top-username">用户</div>
        <div class="topbar-user-id" id="top-userid">—</div>
      </div>
      <button type="button" class="btn-ghost" onclick="logout()">退出登录</button>
    </div>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-head">群聊列表</div>
      <div class="room-list" id="room-list">
        <div style="color:var(--muted);text-align:center;padding:20px;font-family:monospace;">加载中...</div>
      </div>
    </aside>

    <section class="main-view">
      <div class="chat-header">
        <div>
          <div id="current-room-title">请选择群聊</div>
          <div class="chat-header-sub" id="current-room-sub"></div>
        </div>
      </div>
      <div class="chat-wrap" id="chat-wrap">
        <div class="chat-history-hint" id="history-hint"></div>
        <div id="chat-box" class="chat-placeholder" data-empty="1">请选择左侧群聊开始聊天<br>向上滚动加载历史消息</div>
      </div>
      <div class="input-area">
        <input type="text" id="msg-content" placeholder="输入消息，Enter 发送" onkeypress="handleEnter(event)" disabled>
        <button type="button" class="primary" onclick="sendMsg()" id="btn-send" disabled>发送</button>
      </div>
    </section>

    <aside class="aside">
      <div class="aside-block">
        <h3>当前用户</h3>
        <div class="profile-card">
          <div class="profile-avatar" id="aside-avatar">?</div>
          <div class="profile-lines">
            <div class="name" id="aside-username">—</div>
            <div class="sub" id="aside-userdetail">未登录</div>
          </div>
        </div>
      </div>

      <div class="aside-block">
        <h3>群聊搜索</h3>
        <input type="search" id="room-search" placeholder="搜索群聊名称/ID">
        <p class="hint">支持搜索已加入的群聊，可通过下方功能创建或加入新群聊</p>
        <div class="flex-row" style="margin-top:12px;">
          <input type="text" id="new-room-name" placeholder="群聊名称">
          <button type="button" class="primary" onclick="createRoom()" style="border-color:#00ff88;color:#00ff88;background:rgba(0,255,136,0.05);">创建群聊</button>
        </div>
        <div class="flex-row">
          <input type="number" id="join-room-id" placeholder="群聊ID">
          <button type="button" class="primary" onclick="joinRoom()" style="border-color:#ffb800;color:#ffb800;background:rgba(255,184,0,0.05);">加入群聊</button>
        </div>
      </div>

      <div class="aside-block">
        <h3>文件传输</h3>
        <input type="file" id="file-input">
        <div class="flex-row">
          <button type="button" class="primary" id="btn-upload" onclick="startUpload()" style="border-color:#b400ff;color:#b400ff;background:rgba(180,0,255,0.05);flex:1;">上传文件</button>
          <button type="button" class="primary danger" id="btn-cancel" onclick="cancelUpload()" style="flex:1;" disabled>取消上传</button>
        </div>
        <div class="hint" id="upload-status">等待上传</div>
        <div class="progress-bg"><div id="progress-bar"></div></div>
      </div>

      <div class="aside-block aside-members-panel">
        <h3>群成员</h3>
        <p class="members-room-hint" id="members-room-hint">请选择群聊查看成员</p>
        <div class="member-list" id="member-list">
          <div style="color:var(--muted);font-size:11px;padding:8px 12px;">暂无成员</div>
        </div>
        <div class="flex-row" style="margin-top:12px;">
          <input type="number" id="kick-user-id" placeholder="用户ID（退出群聊输入自己ID）" style="margin-bottom:0;">
          <button type="button" class="primary danger" onclick="removeMember()">移除成员</button>
        </div>
      </div>

      <div class="aside-block aside-disband-panel" id="owner-disband-block" style="border-top:1px solid var(--border-dim);">
        <h3>解散群聊</h3>
        <p class="hint">警告：仅群主可操作，解散后群聊将被删除，所有成员将被移出</p>
        <button type="button" class="primary danger" onclick="disbandCurrentRoom()" id="btn-disband-room" style="width:100%;" disabled>解散群聊</button>
      </div>
    </aside>
  </div>

  <script>
    /**
     * 与页面同源（nginx 反代 /api/、/api/v1/ws 时）保持为空字符串。
     * 若静态站点与 API 不同机/不同端口，填后端根地址，例如 "http://192.168.1.10:8080"
     */
    const API_ORIGIN = "";
    const API_BASE = (function () {
      const o = (API_ORIGIN || "").replace(/\/+$/, "");
      if (!o) return "/api/v1";
      return o + "/api/v1";
    })();
    /** 局域网或 HTTPS 下 WebSocket 必须带原协议与 Host，不能写死 127.0.0.1 */
    const WS_BASE = (function () {
      const o = (API_ORIGIN || "").replace(/\/+$/, "");
      if (!o) {
        const scheme = location.protocol === "https:" ? "wss:" : "ws:";
        return scheme + "//" + location.host + "/api/v1/ws";
      }
      try {
        const base = o.includes("://") ? o : location.protocol + "//" + o;
        const u = new URL(base);
        const scheme = u.protocol === "https:" ? "wss:" : "ws:";
        return scheme + "//" + u.host + "/api/v1/ws";
      } catch (e) {
        const scheme = location.protocol === "https:" ? "wss:" : "ws:";
        return scheme + "//" + location.host + "/api/v1/ws";
      }
    })();

    function agentDebugIngest(payload) {
      if (location.hostname !== "localhost" && location.hostname !== "127.0.0.1") return;
      fetch("http://127.0.0.1:7929/ingest/210e3fd0-ebfd-4f99-8c56-23d76fe0a613", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Debug-Session-Id": "3c90a5" },
        body: JSON.stringify(Object.assign({ sessionId: "3c90a5" }, payload))
      }).catch(function () {});
    }

    const jwtToken = localStorage.getItem("lan_im_token");

    if (!jwtToken) {
      alert("请先登录！");
      window.location.href = "index.html";
    }

    let ws = null;
    let currentRoomId = null;
    let currentRoomName = "";
    let isUploading = false;
    let uploadAbortController = null;
    let currentUploadFileHash = null;

    let allRooms = [];
    const loadedMessageIds = new Set();
    let historyNextCursor = "0";
    let historyHasMore = false;
    let historyLoading = false;
    let selfUserId = null;
    let currentRoomCreatorId = null;
    let currentMyRoleInRoom = 1;

    function parseJwtUserId(token) {
      try {
        const p = JSON.parse(atob(token.split('.')[1]));
        return p.user_id != null ? Number(p.user_id) : null;
      } catch (e) {
        return null;
      }
    }

    function canDisbandCurrentRoom() {
      if (selfUserId == null || currentRoomId == null) return false;
      if (Number(currentRoomCreatorId) === Number(selfUserId)) return true;
      if (Number(currentMyRoleInRoom) === 3) return true;
      return false;
    }

    function updateDisbandButtonState() {
      const btnDisband = document.getElementById("btn-disband-room");
      if (btnDisband) btnDisband.disabled = !canDisbandCurrentRoom();
    }

    function loadUserProfile() {
      selfUserId = parseJwtUserId(jwtToken);
      updateDisbandButtonState();
      let user = null;
      try {
        const raw = localStorage.getItem("lan_im_user");
        if (raw) user = JSON.parse(raw);
      } catch (e) {}

      const name = user?.username || (selfUserId != null ? `用户 #${selfUserId}` : "用户");
      const idLine = selfUserId != null ? `ID ${selfUserId}` : "—";
      const roleLine = user?.role != null ? `角色 ${user.role}` : "";

      document.getElementById("top-username").textContent = name;
      document.getElementById("top-userid").textContent = idLine + (roleLine ? " · " + roleLine : "");

      document.getElementById("aside-username").textContent = name;
      document.getElementById("aside-userdetail").textContent = [idLine, roleLine].filter(Boolean).join(" · ") || "—";

      const initials = name.slice(0, 2).toUpperCase();
      document.getElementById("aside-avatar").textContent = initials;
    }

    function rightRotate32(v, n) {
      return (v >>> n) | (v << (32 - n));
    }

    function sha256ArrayBufferFallback(arrayBuffer) {
      const K = [
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
      ];

      const H = [
        0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
        0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
      ];

      const bytes = new Uint8Array(arrayBuffer);
      const bitLen = bytes.length * 8;
      const withOne = bytes.length + 1;
      const padLen = (64 - ((withOne + 8) % 64)) % 64;
      const totalLen = withOne + padLen + 8;

      const padded = new Uint8Array(totalLen);
      padded.set(bytes);
      padded[bytes.length] = 0x80;

      const bitLenHi = Math.floor(bitLen / 0x100000000);
      const bitLenLo = bitLen >>> 0;
      padded[totalLen - 8] = (bitLenHi >>> 24) & 0xff;
      padded[totalLen - 7] = (bitLenHi >>> 16) & 0xff;
      padded[totalLen - 6] = (bitLenHi >>> 8) & 0xff;
      padded[totalLen - 5] = bitLenHi & 0xff;
      padded[totalLen - 4] = (bitLenLo >>> 24) & 0xff;
      padded[totalLen - 3] = (bitLenLo >>> 16) & 0xff;
      padded[totalLen - 2] = (bitLenLo >>> 8) & 0xff;
      padded[totalLen - 1] = bitLenLo & 0xff;

      const w = new Uint32Array(64);

      for (let offset = 0; offset < totalLen; offset += 64) {
        for (let i = 0; i < 16; i++) {
          const j = offset + i * 4;
          w[i] = (
            (padded[j] << 24) |
            (padded[j + 1] << 16) |
            (padded[j + 2] << 8) |
            padded[j + 3]
          ) >>> 0;
        }

        for (let i = 16; i < 64; i++) {
          const s0 = rightRotate32(w[i - 15], 7) ^ rightRotate32(w[i - 15], 18) ^ (w[i - 15] >>> 3);
          const s1 = rightRotate32(w[i - 2], 17) ^ rightRotate32(w[i - 2], 19) ^ (w[i - 2] >>> 10);
          w[i] = (((w[i - 16] + s0) >>> 0) + ((w[i - 7] + s1) >>> 0)) >>> 0;
        }

        let a = H[0], b = H[1], c = H[2], d = H[3], e = H[4], f = H[5], g = H[6], h = H[7];

        for (let i = 0; i < 64; i++) {
          const S1 = rightRotate32(e, 6) ^ rightRotate32(e, 11) ^ rightRotate32(e, 25);
          const ch = (e & f) ^ (~e & g);
          const temp1 = (((((h + S1) >>> 0) + ch) >>> 0) + ((K[i] + w[i]) >>> 0)) >>> 0;
          const S0 = rightRotate32(a, 2) ^ rightRotate32(a, 13) ^ rightRotate32(a, 22);
          const maj = (a & b) ^ (a & c) ^ (b & c);
          const temp2 = (S0 + maj) >>> 0;

          h = g;
          g = f;
          f = e;
          e = (d + temp1) >>> 0;
          d = c;
          c = b;
          b = a;
          a = (temp1 + temp2) >>> 0;
        }

        H[0] = (H[0] + a) >>> 0;
        H[1] = (H[1] + b) >>> 0;
        H[2] = (H[2] + c) >>> 0;
        H[3] = (H[3] + d) >>> 0;
        H[4] = (H[4] + e) >>> 0;
        H[5] = (H[5] + f) >>> 0;
        H[6] = (H[6] + g) >>> 0;
        H[7] = (H[7] + h) >>> 0;
      }

      return H.map(v => v.toString(16).padStart(8, "0")).join("");
    }

    async function computeFileSha256Hex(file) {
      const buf = await file.arrayBuffer();
      const subtle = globalThis.crypto && globalThis.crypto.subtle;
      if (subtle && typeof subtle.digest === "function") {
        const hashBuffer = await subtle.digest("SHA-256", buf);
        return Array.from(new Uint8Array(hashBuffer))
          .map(b => b.toString(16).padStart(2, "0"))
          .join("");
      }
      return sha256ArrayBufferFallback(buf);
    }

    async function readErrorMessage(res) {
      try {
        const data = await res.clone().json();
        if (data && typeof data.error === "string" && data.error) return data.error;
        if (data && typeof data.msg === "string" && data.msg) return data.msg;
      } catch (e) {}
      try {
        const text = await res.text();
        if (text) return text.slice(0, 180);
      } catch (e) {}
      return `HTTP ${res.status}`;
    }

    function escapeHtml(s) {
      if (s == null) return "";
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    /**
     * 聊天内容：普通文本转义；下载地址转为可点击链接（下载接口为公开能力链接，群友点开即可下，无需各自带 JWT）。
     */
    function formatChatMessageHtml(raw) {
      if (raw == null) return "";
      const s = String(raw);
      const re = /(https?:\/\/[^\s]+\/api\/v1\/download\/[^\s?#]+|\/api\/v1\/download\/[^\s?#]+)/g;
      let last = 0;
      let m;
      const parts = [];
      while ((m = re.exec(s)) !== null) {
        parts.push(escapeHtml(s.slice(last, m.index)));
        const urlStr = m[1];
        let href = urlStr;
        let saveAs = "";
        try {
          const u = new URL(urlStr, window.location.origin);
          if (u.pathname.indexOf("/api/v1/download/") !== -1) {
            u.search = "";
            u.hash = "";
            href = u.href;
            const seg = u.pathname.split("/").pop() || "";
            const hm = /^([a-f0-9]{64})_(.+)$/i.exec(seg);
            saveAs = hm ? hm[2] : seg;
          }
        } catch (e) {}
        const dlAttr = saveAs ? ` download="${escapeHtml(saveAs)}"` : "";
        parts.push(
          `<a class="msg-link" href="${escapeHtml(href)}"${dlAttr}>${escapeHtml(urlStr)}</a>`
        );
        last = m.index + m[0].length;
      }
      parts.push(escapeHtml(s.slice(last)));
      return parts.join("");
    }

    function getChatBox() {
      const wrap = document.getElementById("chat-wrap");
      let box = document.getElementById("chat-box");
      if (!box || box.dataset.empty === "1") {
        if (box) box.remove();
        box = document.createElement("div");
        box.id = "chat-box";
        const hint = document.getElementById("history-hint");
        wrap.insertBefore(box, hint.nextSibling);
      }
      return box;
    }

    function ensureChatScrollable() {
      const box = document.getElementById("chat-box");
      if (box && box.dataset.empty === "1") return null;
      return box;
    }

    function isNearBottom(el) {
      if (!el) return true;
      return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    }

    function appendBubble(html, className, scrollToEnd) {
      const box = getChatBox();
      box.dataset.empty = "0";
      const wrap = document.createElement("div");
      wrap.className = "msg-row " + (className || "other");
      wrap.innerHTML = html;
      box.appendChild(wrap);
      if (scrollToEnd !== false && isNearBottom(box)) {
        box.scrollTop = box.scrollHeight;
      }
    }

    function notifyLine(text, kind) {
      const k = kind === "err" ? "err" : "sys";
      appendBubble(`<div class="msg-bubble">${escapeHtml(text)}</div>`, k, true);
    }

    function renderMessageRecord(msg, kind) {
      const sid = msg.sender_id != null ? msg.sender_id : msg.SenderID;
      const content = msg.content != null ? msg.content : msg.Content;
      const id = msg.id != null ? msg.id : msg.ID;
      const created = msg.created_at || msg.CreatedAt;
      let timeStr = "";
      if (created) {
        try { timeStr = new Date(created).toLocaleString(); } catch (e) { timeStr = ""; }
      }
      const own = selfUserId != null && Number(sid) === selfUserId;
      const rowCls = own ? "own" : "other";
      const hist = kind === "hist" ? " hist" : "";
      const meta = `UID ${sid}` + (timeStr ? " · " + timeStr : "");
      return `<div class="msg-meta">${escapeHtml(meta)}</div><div class="msg-bubble">${formatChatMessageHtml(content)}</div>`;
    }

    function insertMessageNode(msg, kind) {
      const id = msg.id != null ? msg.id : msg.ID;
      if (id != null && loadedMessageIds.has(String(id))) return false;
      if (id != null) loadedMessageIds.add(String(id));

      const box = getChatBox();
      box.dataset.empty = "0";
      const wrap = document.createElement("div");
      const sid = msg.sender_id != null ? msg.sender_id : msg.SenderID;
      const own = selfUserId != null && Number(sid) === selfUserId;
      wrap.className = "msg-row " + (own ? "own" : "other") + (kind === "hist" ? " hist" : "");
      wrap.innerHTML = renderMessageRecord(msg, kind);
      box.appendChild(wrap);
      return true;
    }

    function prependMessages(msgs, kind) {
      const box = ensureChatScrollable();
      if (!box) return;
      const oldH = box.scrollHeight;
      const oldT = box.scrollTop;

      const frag = document.createDocumentFragment();
      for (const msg of msgs) {
        const id = msg.id != null ? msg.id : msg.ID;
        if (id != null && loadedMessageIds.has(String(id))) continue;
        if (id != null) loadedMessageIds.add(String(id));
        const sid = msg.sender_id != null ? msg.sender_id : msg.SenderID;
        const own = selfUserId != null && Number(sid) === selfUserId;
        const wrap = document.createElement("div");
        wrap.className = "msg-row " + (own ? "own" : "other") + (kind === "hist" ? " hist" : "");
        wrap.innerHTML = renderMessageRecord(msg, kind);
        frag.appendChild(wrap);
      }
      box.insertBefore(frag, box.firstChild);
      box.scrollTop = oldT + (box.scrollHeight - oldH);
    }

    function resetChatArea() {
      historyNextCursor = "0";
      historyHasMore = false;
      historyLoading = false;
      loadedMessageIds.clear();
      const wrap = document.getElementById("chat-wrap");
      const hint = document.getElementById("history-hint");
      hint.textContent = "";
      const old = document.getElementById("chat-box");
      if (old) old.remove();
      const ph = document.createElement("div");
      ph.id = "chat-box";
      ph.className = "chat-placeholder";
      ph.dataset.empty = "1";
      ph.innerHTML = "正在加载消息…";
      wrap.insertBefore(ph, hint.nextSibling);
    }

    function bindChatScroll() {
      const box = ensureChatScrollable();
      if (!box || box.dataset.scrollBound === "1") return;
      box.dataset.scrollBound = "1";
      box.addEventListener("scroll", () => {
        if (box.scrollTop < 80 && historyHasMore && !historyLoading && currentRoomId) {
          loadOlderHistory();
        }
      });
    }

    async function loadInitialHistory() {
      if (!currentRoomId) return;
      historyLoading = true;
      document.getElementById("history-hint").textContent = "加载中…";
      try {
        const res = await fetch(`${API_BASE}/rooms/${currentRoomId}/messages?cursor=0&limit=40`, {
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        const data = await res.json();
        // #region agent log
        agentDebugIngest({ location: "public.html:loadInitialHistory", message: "messages cursor=0", data: { roomId: currentRoomId, status: res.status, ok: res.ok, msgCount: Array.isArray(data.messages) ? data.messages.length : null, err: data && data.error ? String(data.error).slice(0, 80) : null }, timestamp: Date.now(), hypothesisId: "H4" });
        // #endregion
        if (!res.ok) throw new Error(data.error || "加载失败");

        const msgs = data.messages || [];
        historyNextCursor = data.next_cursor != null && data.next_cursor !== "" ? String(data.next_cursor) : "0";
        historyHasMore = !!data.has_more;

        const ph = document.getElementById("chat-box");
        if (ph && ph.dataset.empty === "1") ph.remove();

        const box = getChatBox();
        box.innerHTML = "";
        box.classList.remove("chat-placeholder");
        box.dataset.empty = "0";

        for (const msg of msgs) {
          const id = msg.id != null ? msg.id : msg.ID;
          if (id != null) loadedMessageIds.add(String(id));
          const sid = msg.sender_id != null ? msg.sender_id : msg.SenderID;
          const own = selfUserId != null && Number(sid) === selfUserId;
          const wrap = document.createElement("div");
          wrap.className = "msg-row " + (own ? "own" : "other") + " hist";
          wrap.innerHTML = renderMessageRecord(msg, "hist");
          box.appendChild(wrap);
        }

        box.scrollTop = box.scrollHeight;
        bindChatScroll();
        document.getElementById("history-hint").textContent =
          historyHasMore ? "↑ 向上滑动加载更早消息" : (msgs.length ? "已加载全部历史" : "暂无消息");
      } catch (e) {
        notifyLine("历史消息加载失败: " + e.message, "err");
        document.getElementById("history-hint").textContent = "";
      } finally {
        historyLoading = false;
      }
    }

    async function loadOlderHistory() {
      if (!currentRoomId || !historyHasMore || historyLoading || !historyNextCursor || historyNextCursor === "0") return;
      historyLoading = true;
      document.getElementById("history-hint").textContent = "加载更早消息…";
      try {
        const res = await fetch(
          `${API_BASE}/rooms/${currentRoomId}/messages?cursor=${historyNextCursor}&limit=40`,
          { headers: { Authorization: `Bearer ${jwtToken}` } }
        );
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "加载失败");

        const msgs = data.messages || [];
        historyNextCursor = data.next_cursor != null && data.next_cursor !== "" ? String(data.next_cursor) : "0";
        historyHasMore = !!data.has_more;

        prependMessages(msgs, "hist");
        document.getElementById("history-hint").textContent =
          historyHasMore ? "↑ 继续上滑加载" : "已加载全部历史";
      } catch (e) {
        notifyLine("加载更早消息失败: " + e.message, "err");
      } finally {
        historyLoading = false;
      }
    }

      localStorage.removeItem("lan_im_token");

    function filterRoomList() {
      const q = (document.getElementById("room-search").value || "").trim().toLowerCase();
      document.querySelectorAll("#room-list .room-item").forEach(el => {
        const name = (el.dataset.roomName || "").toLowerCase();
        el.classList.toggle("hidden", q.length > 0 && !name.includes(q));
      });
    }

    async function loadMyRooms() {
      const listObj = document.getElementById("room-list");
      try {
        const res = await fetch(`${API_BASE}/my_rooms`, {
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        const data = await res.json();
        // #region agent log
        agentDebugIngest({ location: "public.html:loadMyRooms", message: "my_rooms response", data: { status: res.status, ok: res.ok, hasToken: !!(jwtToken && String(jwtToken).length > 20), roomsLen: Array.isArray(data.rooms) ? data.rooms.length : null, errKey: data && data.error ? String(data.error).slice(0, 80) : null }, timestamp: Date.now(), hypothesisId: "H1" });
        // #endregion
        if (!res.ok) {
          listObj.innerHTML = `<div style="color:#e74c3c;text-align:center;padding:16px;">加载失败</div>`;
          return;
        }
        allRooms = data.rooms || [];
        listObj.innerHTML = "";
        if (!allRooms.length) {
          listObj.innerHTML = `<div style="color:var(--muted);text-align:center;padding:24px;">暂无群聊，可在右侧创建或加入</div>`;
          return;
        }
        allRooms.forEach(room => {
          const div = document.createElement("div");
          div.className = "room-item";
          div.dataset.roomName = room.room_name || "";
          div.onclick = () => selectRoom(room, div);
          div.innerHTML = `<div class="room-name"># ${escapeHtml(room.room_name)}</div><div class="room-id">ID: ${room.room_id}</div>`;
          listObj.appendChild(div);
        });
        filterRoomList();
      } catch (e) {
        // #region agent log
        agentDebugIngest({ location: "public.html:loadMyRooms:catch", message: "fetch exception", data: { name: e && e.name, msg: e && String(e.message).slice(0, 120) }, timestamp: Date.now(), hypothesisId: "H2" });
        // #endregion
        listObj.innerHTML = `<div style="color:#e74c3c;text-align:center;">网络异常</div>`;
      }
    }

    async function selectRoom(room, element) {
      const id = room.room_id;
      currentRoomId = id;
      currentRoomName = room.room_name || "";
      currentRoomCreatorId = room.creator_id != null ? room.creator_id : null;
      currentMyRoleInRoom = room.my_role != null ? Number(room.my_role) : 1;
      document.getElementById("current-room-title").textContent = `# ${currentRoomName || "群聊"}`;
      document.getElementById("current-room-sub").textContent = `群 ID ${id}`;
      document.querySelectorAll(".room-item").forEach(el => el.classList.remove("active"));
      if (element) element.classList.add("active");

      document.getElementById("msg-content").disabled = false;
      document.getElementById("btn-send").disabled = false;

      resetChatArea();
      await Promise.all([loadInitialHistory(), refreshMembers()]);
      updateDisbandButtonState();
      notifyLine(`已切换到群「${currentRoomName || id}」`, "sys");
    }

    async function disbandCurrentRoom() {
      if (!canDisbandCurrentRoom()) {
        alert("仅群主或创建者可解散该群。");
        return;
      }
      if (!currentRoomId) {
        alert("请先在左侧选择一个群聊。");
        return;
      }
      const label = currentRoomName ? `「# ${currentRoomName}」` : `（ID ${currentRoomId}）`;
      if (!confirm(`确定解散群 ${label}？\n该操作会软删除群聊并通知在线成员，且不可从前台恢复。`)) return;
      const btn = document.getElementById("btn-disband-room");
      if (btn) btn.disabled = true;
      try {
        const res = await fetch(`${API_BASE}/rooms/${currentRoomId}/disband`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        let data = {};
        try {
          data = await res.json();
        } catch (e) {}
        if (!res.ok) {
          alert(data.error || `解散失败（HTTP ${res.status}）`);
          updateDisbandButtonState();
          return;
        }
        alert(data.msg || "群聊已解散");
        const rid = currentRoomId;
        currentRoomId = null;
        currentRoomName = "";
        currentRoomCreatorId = null;
        currentMyRoleInRoom = 1;
        document.getElementById("current-room-title").textContent = "选择左侧群聊开始聊天";
        document.getElementById("current-room-sub").textContent = "";
        document.getElementById("msg-content").disabled = true;
        document.getElementById("btn-send").disabled = true;
        document.querySelectorAll(".room-item").forEach(el => el.classList.remove("active"));
        resetChatArea();
        await refreshMembers();
        await loadMyRooms();
        updateDisbandButtonState();
        notifyLine(`群 ${rid} 已解散`, "sys");
      } catch (e) {
        alert("网络异常：" + (e.message || e));
      } finally {
        updateDisbandButtonState();
      }
    }

      const container = document.getElementById("member-list");

      }
      if (hint) {
        hint.textContent = `当前群：${currentRoomName ? "# " + currentRoomName : "群聊"}（ID ${currentRoomId}）· 共加载中…`;
      }
      container.innerHTML = `<div style="color:var(--muted);padding:8px 12px;">加载中…</div>`;
      try {
        const res = await fetch(`${API_BASE}/rooms/${currentRoomId}/members`, {
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        const data = await res.json();
        // #region agent log
        agentDebugIngest({ location: "public.html:refreshMembers", message: "members response", data: { roomId: currentRoomId, status: res.status, ok: res.ok, memCount: Array.isArray(data.members) ? data.members.length : null, err: data && data.error ? String(data.error).slice(0, 80) : null }, timestamp: Date.now(), hypothesisId: "H4" });
        // #endregion
        if (!res.ok) {

          container.innerHTML = `<div style="color:#e74c3c;font-size:13px;padding:8px 12px;">${escapeHtml(data.error || "无权限")}</div>`;

    function connectWS() {
      ws = new WebSocket(`${WS_BASE}?token=${jwtToken}`);
      ws.onopen = () => notifyLine("实时连接已建立", "sys");
      ws.onclose = () => notifyLine("连接已断开", "err");
      ws.onerror = () => notifyLine("连接异常", "err");
      ws.onmessage = (e) => {
        const msgs = e.data.split("\n");
        msgs.forEach(rawText => {
          if (!rawText.trim()) return;
          try {
            const msg = JSON.parse(rawText);
            const room = msg.room_id != null ? msg.room_id : msg.RoomID;
            const content = msg.content != null ? msg.content : msg.Content;
            const sender = msg.sender_id != null ? msg.sender_id : msg.SenderID;
            if (room === currentRoomId || room === "全局") {
              const pseudo = {
                sender_id: sender,
                content,
                created_at: new Date().toISOString()
              };
              const near = isNearBottom(ensureChatScrollable());
              insertMessageNode(pseudo, "live");
              const box = ensureChatScrollable();
              if (box && near) box.scrollTop = box.scrollHeight;
            }
          } catch (err) {
            notifyLine("收到无法解析的消息", "err");
          }
        });
      };
    }

    function handleEnter(e) {
      if (e.key === "Enter") sendMsg();
    }

    function sendMsg() {
      if (!currentRoomId) return alert("请先选择一个群聊！");
      if (!ws || ws.readyState !== WebSocket.OPEN) return alert("连接未就绪！");
      const input = document.getElementById("msg-content");
      if (!input.value) return;
      ws.send(JSON.stringify({ room_id: currentRoomId, content: input.value }));
      notifyLine(`已发送: ${input.value}`, "sys");
      input.value = "";
    }

    async function createRoom() {
      const name = document.getElementById("new-room-name").value.trim();
      if (!name) return alert("群聊名称不可为空");
      try {
        const res = await fetch(`${API_BASE}/rooms`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${jwtToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name })
        });
        if (res.ok) {
          document.getElementById("new-room-name").value = "";
          await loadMyRooms();
        } else alert("创建群聊失败");
      } catch (e) {
        alert("网络异常");
      }
    }

    async function joinRoom() {
      const id = parseInt(document.getElementById("join-room-id").value, 10);
      if (!id) return;
      try {
        const res = await fetch(`${API_BASE}/rooms/${id}/join`, {
          method: "POST",
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        if (res.ok) {
          document.getElementById("join-room-id").value = "";
          await loadMyRooms();
        } else alert("加入群聊失败");
      } catch (e) {
        alert("网络异常");
      }
    }

    async function removeMember() {
      if (!currentRoomId) return alert("请先选择群聊！");
      const targetId = parseInt(document.getElementById("kick-user-id").value, 10);
      if (!targetId) return;
      try {
        const res = await fetch(`${API_BASE}/rooms/${currentRoomId}/members/${targetId}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        if (res.ok) {
          document.getElementById("kick-user-id").value = "";
          await loadMyRooms();
          await refreshMembers();
        } else {
          const j = await res.json().catch(() => ({}));
          alert(j.error || "操作失败");
        }
      } catch (e) {
        alert("请求异常");
      }
    }

    async function startUpload() {
      if (!currentRoomId) {
        return alert("请先选择群聊！");
      }
      if (isUploading) return;

      const fileInput = document.getElementById("file-input");
      if (!fileInput.files.length) {
        return alert("请选择文件");
      }

      const file = fileInput.files[0];
      if (!file || file.size <= 0) {
        alert("空文件暂不支持上传");
        return;
      }
      const chunkSize = 1024 * 1024;
      const totalChunks = Math.ceil(file.size / chunkSize);
      const safeFileName = encodeURIComponent(file.name);

      const statusBox = document.getElementById("upload-status");
      statusBox.textContent = "[0/3] 计算整文件 SHA-256…";
      let fileHash;
      try {
        fileHash = await computeFileSha256Hex(file);
      } catch (e) {
        statusBox.textContent = "校验和失败: " + (e.message || e);
        return;
      }
      currentUploadFileHash = fileHash;

      isUploading = true;
      document.getElementById("btn-upload").disabled = true;
      document.getElementById("btn-cancel").disabled = false;
      uploadAbortController = new AbortController();

      try {
        statusBox.textContent = "[1/3] 检查上传状态…";
        const checkRes = await fetch(`${API_BASE}/upload/status?hash=${fileHash}&filename=${safeFileName}`, {
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        const checkData = await checkRes.json();

        if (checkData.status === "completed") {
          updateProgress(totalChunks, totalChunks);
          statusBox.textContent = "秒传成功";
          ws.send(JSON.stringify({
            room_id: currentRoomId,
            content: `[文件] ${checkData.download_url}`
          }));
          unlockUploadUI();
          return;
        }

        const uploadedChunks = checkData.uploaded_chunks || [];
        let completedCount = uploadedChunks.length;
        updateProgress(completedCount, totalChunks);

        statusBox.textContent = "[2/3] 上传分片…";
        const uploadTasks = [];

        for (let i = 0; i < totalChunks; i++) {
          if (uploadedChunks.includes(i)) continue;
          uploadTasks.push(async () => {
            const formData = new FormData();
            formData.append("chunk", file.slice(i * chunkSize, Math.min((i + 1) * chunkSize, file.size)));
            formData.append("hash", fileHash);
            formData.append("chunk_index", String(i));

            let lastErr = "";
            const maxAttempts = 2;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const res = await fetch(`${API_BASE}/upload/chunk`, {
                method: "POST",
                headers: { Authorization: `Bearer ${jwtToken}` },
                body: formData,
                signal: uploadAbortController.signal
              });
              if (res.ok) {
                lastErr = "";
                break;
              }
              const detail = await readErrorMessage(res);
              lastErr = `HTTP ${res.status}: ${detail}`;
              if (res.status === 401) {
                throw new Error("登录已过期，请重新登录");
              }
              if (attempt < maxAttempts) {
                await new Promise(r => setTimeout(r, 250));
              }
            }
            if (lastErr) {
              throw new Error(`分片 ${i} 上传失败（${lastErr}）`);
            }
            completedCount++;
            updateProgress(completedCount, totalChunks);
          });
        }

        const MAX_CONCURRENT = 6;
        let taskIndex = 0;
        await Promise.all(
          new Array(MAX_CONCURRENT).fill(null).map(async () => {
            while (taskIndex < uploadTasks.length) {
              const idx = taskIndex++;
              await uploadTasks[idx]();
            }
          })
        );

        statusBox.textContent = "[3/3] 合并文件…";
        const mergeHash = String(fileHash || "").trim();
        const mergeFilename = String(file.name || "").trim();
        const mergeTotalChunks = String(totalChunks);
        if (!mergeHash || !mergeFilename || totalChunks <= 0) {
          throw new Error("合并参数本地校验失败");
        }

        const mergeData = new FormData();
        mergeData.append("hash", mergeHash);
        mergeData.append("filename", mergeFilename);
        mergeData.append("total_chunks", mergeTotalChunks);

        const mergeRes = await fetch(`${API_BASE}/upload/merge`, {
          method: "POST",
          headers: { Authorization: `Bearer ${jwtToken}` },
          body: mergeData
        });
        const mergeResult = await mergeRes.json();
        if (!mergeRes.ok) throw new Error(mergeResult.error);

        statusBox.textContent = "上传完成";
        ws.send(JSON.stringify({
          room_id: currentRoomId,
          content: `[文件] ${mergeResult.download_url}`
        }));
      } catch (err) {
        if (err.name === "AbortError") {
          statusBox.textContent = "已取消上传";
        } else {
          statusBox.textContent = "失败: " + err.message;
        }
      } finally {
        unlockUploadUI();
      }
    }

    async function cancelUpload() {
      if (!isUploading) return;
      const hashToCancel = currentUploadFileHash;
      if (uploadAbortController) uploadAbortController.abort();

      const statusBox = document.getElementById("upload-status");
      if (!hashToCancel) {
        statusBox.textContent = "无法清理临时文件（缺少哈希）";
        return;
      }
      try {
        await fetch(`${API_BASE}/upload/cancel?hash=${hashToCancel}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${jwtToken}` }
        });
        statusBox.textContent = "已请求清理临时分片";
        document.getElementById("progress-bar").style.width = "0%";
      } catch (e) {
        statusBox.textContent = "清理请求失败";
      }
    }

    function updateProgress(completed, total) {
      if (total <= 0) return;
      const percent = Math.round((completed / total) * 100);
      document.getElementById("progress-bar").style.width = percent + "%";
      document.getElementById("upload-status").textContent = `上传进度 ${percent}%`;
    }

    function unlockUploadUI() {
      isUploading = false;
      currentUploadFileHash = null;
      document.getElementById("btn-upload").disabled = false;
      document.getElementById("btn-cancel").disabled = true;
    }

    window.onload = init;
  </script>
</body>
</html>
